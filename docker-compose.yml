version: "3.9"
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: dormly
      POSTGRES_PASSWORD: dormly
      POSTGRES_DB: dormly
    ports:
      - "5432:5432"
    volumes:
      - dormly_db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "4000:4000"

volumes:
  dormly_db_data:
