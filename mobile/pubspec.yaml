name: dormly
description: One Platform. Every Property.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  dio: ^5.5.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_secure_storage: ^9.2.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  file_picker: ^8.3.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_lints: ^4.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/

dependency_overrides:
  flutter_plugin_android_lifecycle: 2.0.24